<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numero Master</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="question-card">
            <div class="instruction">¿Cuál es el resultado?</div>
            <div class="question-text" id="question">2 + 2</div>
        </div>
        <div class="feedback" id="feedback"></div>
        <div class="options-grid" id="numOptions"></div>
        <div class="stats">
            <div>Puntos: <span id="score">0</span></div>
            <div>Nivel: <span id="level">1</span></div>
        </div>
        <button id="reset-btn" class="reset-btn">Reiniciar Juego</button>
    </div>
    
    <audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/beep-07.mp3" preload="auto"></audio>
    <audio id="levelUpSound" src="https://www.soundjay.com/buttons/sounds/beep-09.mp3" preload="auto"></audio>
    
    <script src="script.js"></script>
</body>
</html>
