<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎶 Simón Musical</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="simon.css">
</head>
<body>

    
    <div id="start-overlay" class="overlay-screen d-flex flex-column justify-content-center align-items-center">
        <div class="text-center start-card">
            <div class="logo-icon mb-3">🎹</div>
            <h1 class="display-4 fw-bold title-glow mb-2">SIMÓN<br><span class="text-accent">MUSICAL</span></h1>
            <p class="lead text-muted mb-4">¿Cuánto aguanta tu memoria?</p>
            <div class="d-flex gap-3 justify-content-center mb-4">
                <div class="stat-badge"><i class="bi bi-music-note-beamed"></i> 4 tonos</div>
                <div class="stat-badge"><i class="bi bi-lightning-charge-fill"></i> Velocidad creciente</div>
                <div class="stat-badge"><i class="bi bi-trophy-fill"></i> Highscore</div>
            </div>
            <button id="btn-start" class="btn btn-glow btn-lg px-5 py-3" onclick="startGame()">
                <i class="bi bi-play-circle-fill me-2"></i> JUGAR
            </button>
        </div>
        <div class="particles-bg" id="particles-start"></div>
    </div>

    <div id="gameover-overlay" class="overlay-screen d-flex flex-column justify-content-center align-items-center d-none">
        <div class="text-center gameover-card">
            
            <h2 class="fw-black title-glow">GAME OVER</h2>
            <p class="text-muted">Llegaste hasta el nivel</p>
            <div class="level-reached mb-2" id="final-level">—</div>
            <div id="new-record-badge" class="badge-record d-none mb-3">
                <i class="bi bi-star-fill me-1"></i> ¡NUEVO RÉCORD!
            </div>
            <p class="text-muted small">Récord: <span id="highscore-go">0</span></p>
            <div class="d-flex gap-3 justify-content-center mt-4">
                <button class="btn btn-outline-light px-4" onclick="showStart()">
                    <i class="bi bi-house-fill me-1"></i> Inicio
                </button>
                <button class="btn btn-glow px-4" onclick="startGame()">
                    <i class="bi bi-arrow-repeat me-1"></i> Reintentar
                </button>
            </div>
        </div>
    </div>

    <header class="game-header d-none" id="game-header">
        <div class="container-fluid px-4">
            <div class="row align-items-center py-2">
                <div class="col-auto">
                    <span class="game-title"><i class="bi bi-music-note-beamed me-2"></i>SIMÓN</span>
                </div>
                <div class="col d-flex justify-content-center gap-3">
                    <div class="hud-chip">
                        <span class="hud-label">NIVEL</span>
                        <span class="hud-value" id="hud-level">1</span>
                    </div>
                    <div class="hud-chip">
                        <span class="hud-label">RÉCORD</span>
                        <span class="hud-value" id="hud-highscore">0</span>
                    </div>
                </div>
                <div class="col-auto">
                    <div class="status-pill" id="status-pill">
                        <span id="status-text">Iniciando...</span>
                    </div>
                </div>
            </div>
        </div>
    
        <div class="sequence-progress" id="sequence-progress">
            <div class="sequence-bar" id="sequence-bar"></div>
        </div>
    </header>

    
    <main id="game-main" class="d-none">
        <div id="game-board">
            <div id="pad-green"  class="pad" data-color="green"  onclick="handleInput('green')">
                <div class="pad-inner"><i class="bi bi-music-note pad-icon"></i></div>
                <div class="pad-ripple"></div>
            </div>
            <div id="pad-red"    class="pad" data-color="red"    onclick="handleInput('red')">
                <div class="pad-inner"><i class="bi bi-music-note-beamed pad-icon"></i></div>
                <div class="pad-ripple"></div>
            </div>
            <div id="pad-yellow" class="pad" data-color="yellow" onclick="handleInput('yellow')">
                <div class="pad-inner"><i class="bi bi-music-note-list pad-icon"></i></div>
                <div class="pad-ripple"></div>
            </div>
            <div id="pad-blue"   class="pad" data-color="blue"   onclick="handleInput('blue')">
                <div class="pad-inner"><i class="bi bi-soundwave pad-icon"></i></div>
                <div class="pad-ripple"></div>
            </div>

            
            <div id="center-hub">
                <div class="hub-inner d-flex flex-column align-items-center justify-content-center">
                    <div class="hub-emoji" id="hub-emoji">🎹</div>
                    <div class="hub-level" id="hub-level">1</div>
                    <div class="hub-msg" id="hub-msg">¡Listo!</div>
                    <div class="progress-dots mt-2" id="progress-dots"></div>
                </div>
            </div>
        </div>

        
        <div class="mobile-hint d-md-none d-flex justify-content-center gap-2 mt-3 px-3">
            <div class="hint-key" id="hint-green"><i class="bi bi-circle-fill text-success"></i></div>
            <div class="hint-key" id="hint-red"><i class="bi bi-circle-fill text-danger"></i></div>
            <div class="hint-key" id="hint-yellow"><i class="bi bi-circle-fill text-warning"></i></div>
            <div class="hint-key" id="hint-blue"><i class="bi bi-circle-fill" style="color:#2979ff"></i></div>
        </div>
    </main>

    
    <div id="block-layer"></div>

    
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
        <div id="game-toast" class="toast align-items-center border-0" role="alert" aria-live="assertive">
            <div class="d-flex">
                <div class="toast-body fw-bold" id="toast-msg">Mensaje</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Game JS -->
    <script src="simon.js"></script>
</body>
</html>
