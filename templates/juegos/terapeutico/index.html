{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 Mundo de Aprendizaje Clínico</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'juegos/terapeutico/styles.css' %}">
    <link rel="stylesheet" href="{% static 'juegos/common/theme.css' %}">
</head>
<body>
    <button class="theme-toggle-btn" onclick="toggleTheme()" title="Cambiar Modo" style="top: 15px; right: 15px;">
        <span class="theme-icon">🌙</span> <span class="theme-text">Tema</span>
    </button>
<a href="{% url 'index' %}" class="btn-volver-menu" style="position: fixed; top: 15px; left: 15px; background: #2c3e50; color: white !important; padding: 12px 20px; border-radius: 30px; text-decoration: none !important; font-weight: bold; backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.4); z-index: 10000; box-shadow: 0 5px 20px rgba(0,0,0,0.5); display: block;">⬅️ Menú Principal</a>

<div id="particles"></div>

<div class="container py-4" style="max-width: 860px; position: relative; z-index: 2;">

    
    <div id="inicio" class="pantalla animate__in">
    
        <div class="text-center mb-4">
            <div class="avatar-icon mb-2">🌈</div>
            <h2 class="titulo-pantalla">¡Mundo de Aprendizaje!</h2>
            <p class="subtitulo">¿Qué módulo quieres explorar hoy?</p>
        </div>

    
        <div class="progreso-global mb-4 px-2">
            <div class="d-flex justify-content-between mb-1">
                <small class="fw-bold text-muted">Progreso total</small>
                <small id="pct-global" class="fw-bold text-success">0%</small>
            </div>
            <div class="progress" style="height: 14px; border-radius: 20px;">
                <div id="barra-global" class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 0%; border-radius: 20px;"></div>
            </div>
        </div>

        
        <div class="row g-3 justify-content-center mb-4">

            <div class="col-6 col-sm-4 col-md-4">
                <button class="modulo-card" onmouseenter="vozGuia('Juguemos con atención')" onclick="modulo='colores';iniciar()">
                    <div class="modulo-icon">🎨</div>
                    <div class="modulo-nombre">Atención</div>
                    <div class="modulo-barra">
                        <div class="modulo-fill" id="fill-colores" style="width:0%"></div>
                    </div>
                    <small id="pct-colores" class="modulo-pct">0%</small>
                </button>
            </div>

            <div class="col-6 col-sm-4 col-md-4">
                <button class="modulo-card" onmouseenter="vozGuia('Juguemos con emociones')" onclick="modulo='emociones';iniciar()">
                    <div class="modulo-icon">🎭</div>
                    <div class="modulo-nombre">Emociones</div>
                    <div class="modulo-barra">
                        <div class="modulo-fill" id="fill-emociones" style="width:0%"></div>
                    </div>
                    <small id="pct-emociones" class="modulo-pct">0%</small>
                </button>
            </div>

            <div class="col-6 col-sm-4 col-md-4">
                <button class="modulo-card" onmouseenter="vozGuia('Juguemos con rutinas')" onclick="modulo='rutina';iniciar()">
                    <div class="modulo-icon">🏠</div>
                    <div class="modulo-nombre">Rutinas</div>
                    <div class="modulo-barra">
                        <div class="modulo-fill" id="fill-rutina" style="width:0%"></div>
                    </div>
                    <small id="pct-rutina" class="modulo-pct">0%</small>
                </button>
            </div>

            <div class="col-6 col-sm-4 col-md-4">
                <button class="modulo-card" onmouseenter="vozGuia('Juguemos con matemáticas')" onclick="modulo='mate';iniciar()">
                    <div class="modulo-icon">🔢</div>
                    <div class="modulo-nombre">Matemática</div>
                    <div class="modulo-barra">
                        <div class="modulo-fill" id="fill-mate" style="width:0%"></div>
                    </div>
                    <small id="pct-mate" class="modulo-pct">0%</small>
                </button>
            </div>

            <div class="col-6 col-sm-4 col-md-4">
                <button class="modulo-card" onmouseenter="vozGuia('Juguemos con motricidad')" onclick="modulo='motricidad';iniciar()">
                    <div class="modulo-icon">🖐️</div>
                    <div class="modulo-nombre">Motricidad</div>
                    <div class="modulo-barra">
                        <div class="modulo-fill" id="fill-motricidad" style="width:0%"></div>
                    </div>
                    <small id="pct-motricidad" class="modulo-pct">0%</small>
                </button>
            </div>

            <div class="col-6 col-sm-4 col-md-4">
                <button class="modulo-card" onmouseenter="vozGuia('Juguemos con memoria visual')" onclick="modulo='memoria';iniciar()">
                    <div class="modulo-icon">🧠</div>
                    <div class="modulo-nombre">Memoria Visual</div>
                    <div class="modulo-barra">
                        <div class="modulo-fill" id="fill-memoria" style="width:0%"></div>
                    </div>
                    <small id="pct-memoria" class="modulo-pct">0%</small>
                </button>
            </div>

        </div>

        <div class="text-center">
            <button class="btn-accion btn-informe" onclick="verPanel()">
                <i class="bi bi-bar-chart-fill me-2"></i>Informe Clínico
            </button>
        </div>
    </div>

    
    <div id="juego" class="pantalla hidden">

        
        <div class="juego-header d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <div class="d-flex align-items-center gap-3">
                <div id="timer-clinic" class="timer-badge">⏱️ 0 s</div>
                <div id="modulo-badge" class="modulo-badge-juego"></div>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span id="estrellas-juego" class="estrellas-display">⭐ 0</span>
                <button class="btn-salir" onclick="salirJuego()">
                    <i class="bi bi-door-open-fill me-1"></i>Salir
                </button>
            </div>
        </div>

        
        <div class="mb-3 px-1">
            <div class="progress" style="height: 18px; border-radius: 20px;">
                <div id="barra-modulo" class="progress-bar progress-bar-striped progress-bar-animated"
                style="width:0%; border-radius:20px; background: linear-gradient(90deg,#f59e0b,#10b981);">
                </div>
            </div>
        </div>

        
        <div class="instruccion text-center" id="instruccion"></div>

        
        <div id="zona" class="zona-juego d-flex justify-content-center align-items-center flex-wrap gap-3"></div>

        
        <div class="refuerzo text-center" id="refuerzo"></div>
    </div>

    
    <div id="panel" class="pantalla hidden">
        <div class="text-center mb-4">
            <h2 class="titulo-pantalla">📊 Informe de Evolución</h2>
            <p class="subtitulo" id="panel-nombre-info"></p>
        </div>

        
        <div class="row g-3 mb-4" id="tarjetas-progreso"></div>

        
        <div class="text-center mb-4">
            <canvas id="graf" class="grafica-canvas" width="720" height="320"></canvas>
        </div>

        
        <div class="resumen-clinico mb-4" id="resumen-clinico"></div>

        <div class="text-center">
            <button class="btn-accion btn-volver" onclick="volver()">
                <i class="bi bi-arrow-left-circle-fill me-2"></i>Volver al Menú
            </button>
        </div>
    </div>

</div>


<div id="toast-refuerzo" class="toast-refuerzo hidden"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'juegos/common/theme.js' %}"></script>
<!-- Custom JS -->
    <script src="{% static 'juegos/terapeutico/script.js' %}"></script>
</body>
</html>
